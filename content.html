<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitnessLLM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>
    <div class="app-container">
       
        <header class="title-box">
            <h1>FitnessLLM</h1>
        </header>


        <div class="input-section">
            <button id="submit-btn" class="submit"></button>
            <textarea id="question-input" placeholder="Insert Fitness Question Here"></textarea>    
          </button>

        </div>
         
    <div class="common-questions">
        <button class="pill-btn">Frequency</button>
        <button class="pill-btn">diet</button>
        <button class="pill-btn">Recovery</button>
    </div>
            
        
    <div id="ai-response" class="response-box">
    </div>
        <div>
        <img src="star.png" id="1" class="stars">
        <img src="star.png" id="2" class="stars">
        <img src="star.png" id="3" class="stars">
        <img src="star.png" id="4" class="stars">
        <img src="star.png" id="5" class="stars">
    </div>
    <div class="human-stats">
                <textarea id="Stats" placeholder="Height?"></textarea>
                <textarea id="Stats" placeholder="Weight?"></textarea>
    </div>
    </div>

    <script src="functionality.js"></script>
</body>
</html>
